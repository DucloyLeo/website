<style>
.admin-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem}
.admin-cal-nav{display:flex;align-items:center;justify-content:center;gap:16px}
.admin-cal-nav button{background:none;border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:4px 12px;cursor:pointer;transition:background .15s}
.admin-cal-nav button:hover{background:var(--surface2)}
.admin-cal-month{font-family:'Crimson Pro',serif;font-size:1.3rem;font-weight:600}
.admin-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:2rem}
.admin-cal-weekday{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);text-align:center;padding:4px 0}
.admin-cal-day{border:1px solid var(--border);border-radius:8px;padding:8px 6px;min-height:64px;cursor:pointer;transition:all .15s;position:relative;font-size:11px}
.admin-cal-day:hover{border-color:var(--border2);background:var(--surface2)}
.admin-cal-day.selected{border-color:var(--moon);background:rgba(143,168,212,.08)}
.admin-cal-day.has-level{border-color:var(--border2)}
.admin-cal-day.manual{border-color:rgba(245,200,66,.4)}
.admin-cal-day.past{opacity:.6}
.admin-cal-day.empty{border:none;cursor:default;background:none}
.admin-cal-day:hover.empty{background:none}
.day-num{font-weight:500;color:var(--text);margin-bottom:4px}
.day-diff{font-size:9px;border-radius:99px;padding:1px 6px;display:inline-block;margin-bottom:2px}
.day-name{font-size:9px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.day-manual-dot{position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--sun)}
.edit-panel{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:1.5rem;display:none}
.edit-panel.show{display:block}
.gen-btn{margin-left:auto}
</style>
</head>
<body>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <p class="admin-nav-label">Navigation</p>
    <a href="index.html"  class="admin-nav-item">📊 Dashboard</a>
    <a href="users.html"  class="admin-nav-item">👥 Utilisateurs</a>
    <a href="levels.html" class="admin-nav-item">🎮 Niveaux</a>
    <a href="daily.html"  class="admin-nav-item active">📅 Journaliers</a>
    <a href="badges.html" class="admin-nav-item">🏅 Badges</a>
    <a href="difficulty.html" class="admin-nav-item">⚙️ Difficultés</a>
    <hr class="sep">
    <a href="/index.html" class="admin-nav-item">← Site public</a>

  <div class="admin-content">
    <div id="loading" style="color:var(--muted);font-size:13px;padding:2rem 0">Chargement…</div>
    <div id="content" style="display:none">

      <div class="admin-cal-header">
        <div class="admin-cal-nav">
          <button id="btn-prev" onclick="prevMonth()">‹</button>
          <span class="admin-cal-month" id="cal-label"></span>
          <button onclick="nextMonth()">›</button>
        </div>
        <button class="btn gen-btn" onclick="generateMonth()">⚡ Générer les jours manquants</button>
      </div>

      <div class="admin-cal-grid" id="cal-grid"></div>

      <div class="edit-panel" id="edit-panel">
        <h3 style="margin-bottom:1rem;font-size:1rem" id="edit-title">—</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:.8rem">
          <div class="form-group">
            <label class="form-label">Nom du niveau (optionnel)</label>
            <input class="form-input" type="text" id="edit-name" placeholder="Ex: Le Labyrinthe">
          </div>
          <div class="form-group">
            <label class="form-label">Difficulté</label>
            <select class="form-input" id="edit-diff">
              <option value="easy">Facile</option>
              <option value="medium">Moyen</option>
              <option value="hard">Difficile</option>
            </select>
          </div>
        </div>
        <div class="form-group" style="margin-bottom:1rem">
          <label class="form-label">Seed (7 ou 16 caractères) — laisser vide pour générer automatiquement</label>
          <input class="form-input" type="text" id="edit-seed" placeholder="Seed du puzzle" maxlength="16">
        </div>
        <div class="alert error" id="edit-error"></div>
        <div style="display:flex;gap:8px;margin-top:.5rem">
          <button class="btn sun" onclick="saveLevel()">Sauvegarder</button>
          <button class="btn" onclick="closeEdit()">Annuler</button>
          <button class="btn danger" id="delete-btn" onclick="deleteLevel()" style="margin-left:auto">Supprimer</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/auth.js?v=3"></script>
<script>
const DIFF_LABELS = { easy:'Facile', medium:'Moyen', hard:'Difficile' };
const DIFF_COLORS = { easy:'var(--green)', medium:'var(--sun)', hard:'#d87a50' };
const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

let calYear, calMonth, levelsMap = {}, selectedDate = null;

function getParisTodayStr() {
  return new Intl.DateTimeFormat('fr-CA', { timeZone: 'Europe/Paris' }).format(new Date());
}

async function init() {
  const ok = await requireAdmin('/index.html');
  if (!ok) return;
  const today = new Date();
  calYear = today.getFullYear();
  calMonth = today.getMonth();
  await loadMonth();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = '';
  initNavAuth();
}

async function loadMonth() {
  const firstDay = `${calYear}-${String(calMonth + 1).padStart(2,'0')}-01`;
  const lastDay  = `${calYear}-${String(calMonth + 1).padStart(2,'0')}-${new Date(calYear, calMonth + 1, 0).getDate()}`;
  const { data } = await db.from('daily_levels').select('*').gte('date', firstDay).lte('date', lastDay);
  levelsMap = {};
  (data || []).forEach(l => { levelsMap[l.date] = l; });
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('cal-label').textContent = `${MONTHS_FR[calMonth]} ${calYear}`;
  const prevBtn=document.getElementById('btn-prev');
  if(prevBtn)prevBtn.disabled=(calYear<=ADMIN_MIN_YEAR&&calMonth<=ADMIN_MIN_MONTH);
  const grid = document.getElementById('cal-grid');
  const days = ['L','M','M','J','V','S','D'];
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  let firstWeekday = new Date(calYear, calMonth, 1).getDay();
  firstWeekday = firstWeekday === 0 ? 6 : firstWeekday - 1;

  let html = days.map(d => `<div class="admin-cal-weekday">${d}</div>`).join('');
  for (let i = 0; i < firstWeekday; i++) html += `<div class="admin-cal-day empty"></div>`;

  const todayStr = getParisTodayStr();
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const level = levelsMap[dateStr];
    const isPast = dateStr <= todayStr;
    const isSelected = dateStr === selectedDate;
    let cls = 'admin-cal-day';
    if (!level) cls += ' no-level';
    else { cls += ' has-level'; if (level.is_manual) cls += ' manual'; }
    if (isPast && dateStr < todayStr) cls += ' past';
    if (isSelected) cls += ' selected';

    const diffChip = level ? `<span class="day-diff" style="background:${DIFF_COLORS[level.difficulty]}22;color:${DIFF_COLORS[level.difficulty]}">${DIFF_LABELS[level.difficulty]}</span>` : '';
    const name = level?.name ? `<div class="day-name">${escHtml(level.name)}</div>` : '';
    const manualDot = level?.is_manual ? '<div class="day-manual-dot" title="Niveau manuel"></div>' : '';

    html += `<div class="${cls}" onclick="selectDay('${dateStr}')">
      <div class="day-num">${d}</div>
      ${diffChip}${name}${manualDot}
    </div>`;
  }
  grid.innerHTML = html;
}

function selectDay(dateStr) {
  selectedDate = dateStr;
  renderCalendar();
  const level = levelsMap[dateStr];
  const panel = document.getElementById('edit-panel');
  const d = new Date(dateStr + 'T00:00:00');
  document.getElementById('edit-title').textContent =
    `${d.getDate()} ${MONTHS_FR[d.getMonth()]} ${d.getFullYear()}${level?.name ? ' — ' + level.name : ''}`;
  document.getElementById('edit-name').value = level?.name || '';
  document.getElementById('edit-diff').value = level?.difficulty || 'medium';
  document.getElementById('edit-seed').value = level?.is_manual ? (level?.seed || '') : '';
  const isPastWithLevel = dateStr < getParisTodayStr() && !!level;
  const seedInput = document.getElementById('edit-seed');
  seedInput.disabled = isPastWithLevel;
  seedInput.title = isPastWithLevel ? 'Seed verrouillée — niveau déjà passé' : '';
  if(isPastWithLevel){ seedInput.value = level.seed; seedInput.style.opacity='.45'; }
  else { seedInput.style.opacity=''; }
  document.getElementById('edit-error').classList.remove('show');
  document.getElementById('delete-btn').style.display = level ? '' : 'none';
  panel.classList.add('show');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closeEdit() {
  selectedDate = null;
  document.getElementById('edit-panel').classList.remove('show');
  renderCalendar();
}

async function saveLevel() {
  const name = document.getElementById('edit-name').value.trim();
  const diff = document.getElementById('edit-diff').value;
  const seed = document.getElementById('edit-seed').value.trim();
  const errEl = document.getElementById('edit-error');
  errEl.classList.remove('show');

  if (seed && seed.length !== 7 && seed.length !== 16) {
    errEl.textContent = 'La seed doit faire 7 ou 16 caractères (ou vide pour auto).';
    errEl.classList.add('show'); return;
  }

  const finalSeed = seed || generateSeedForDate(selectedDate, diff);
  const payload = { date: selectedDate, seed: finalSeed, difficulty: diff, is_manual: true, name: name || null };
  const existing = levelsMap[selectedDate];

  if (existing) {
    const { error } = await db.from('daily_levels').update(payload).eq('id', existing.id);
    if (error) { errEl.textContent = error.message; errEl.classList.add('show'); return; }
  } else {
    const { error } = await db.from('daily_levels').insert(payload);
    if (error) { errEl.textContent = error.message; errEl.classList.add('show'); return; }
  }
  await loadMonth();
  closeEdit();
}

async function deleteLevel() {
  const level = levelsMap[selectedDate];
  if (!level) return;
  if (!confirm('Supprimer ce niveau journalier ?')) return;
  await db.from('daily_levels').delete().eq('id', level.id);
  await loadMonth();
  closeEdit();
}

async function generateMonth() {
  if (!confirm(`Générer les jours manquants de ${MONTHS_FR[calMonth]} ${calYear} ?`)) return;
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const diffs = balancedDiffs(daysInMonth);
  let count = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if (levelsMap[dateStr]) continue;
    const diff = diffs[d - 1];
    const seed = generateSeedForDate(dateStr, diff);
    await db.from('daily_levels').insert({ date: dateStr, seed, difficulty: diff, is_manual: false });
    count++;
  }
  await loadMonth();
  if (count === 0) alert('Tous les jours du mois sont déjà générés.');
  else alert(`${count} niveau${count > 1 ? 'x' : ''} généré${count > 1 ? 's' : ''}.`);
}

function balancedDiffs(total) {
  const diffs = [];
  const perDiff = Math.floor(total / 3);
  const extra = total % 3;
  const pool = [
    ...Array(perDiff + (extra > 0 ? 1 : 0)).fill('easy'),
    ...Array(perDiff + (extra > 1 ? 1 : 0)).fill('medium'),
    ...Array(perDiff).fill('hard')
  ];
  while (pool.length) {
    const i = Math.floor(Math.random() * pool.length);
    diffs.push(pool.splice(i, 1)[0]);
  }
  return diffs;
}

function generateSeedForDate(dateStr, diff) {
  const d = { easy:0, medium:1, hard:2 }[diff];
  const hash = dateStr.split('').reduce((a, c) => ((a << 5) - a + c.charCodeAt(0)) | 0, 0);
  const nb = (Math.abs(hash) * 1664525 + 1013904223) >>> 0;
  const bytes = new Uint8Array(5);
  bytes[0] = (nb >>> 24) & 0xFF; bytes[1] = (nb >>> 16) & 0xFF;
  bytes[2] = (nb >>> 8) & 0xFF;  bytes[3] = nb & 0xFF; bytes[4] = d << 6;
  return btoa(String.fromCharCode(...bytes)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

const ADMIN_MIN_YEAR=2026, ADMIN_MIN_MONTH=4;
function prevMonth(){
  let m=calMonth-1,y=calYear;
  if(m<0){m=11;y--;}
  if(y<ADMIN_MIN_YEAR||(y===ADMIN_MIN_YEAR&&m<ADMIN_MIN_MONTH))return;
  calMonth=m;calYear=y;closeEdit();loadMonth();
}
function nextMonth(){ calMonth++;if(calMonth>11){calMonth=0;calYear++;}closeEdit();loadMonth(); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') prevMonth();
  if (e.key === 'ArrowRight') nextMonth();
});

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

init();
</script>
</body>
