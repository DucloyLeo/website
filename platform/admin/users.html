<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#0e0e0f">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">

<title>Admin — Utilisateurs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css?v=5">
<script>(function(){const t=localStorage.getItem('tango_theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');})();</script>
<style>
  .search-bar { display:flex; gap:8px; margin-bottom:1.5rem; }
  .search-bar input { flex:1; }
  .user-actions { display:flex; gap:6px; flex-wrap:wrap; }
  .action-btn {
    font-family:'DM Mono',monospace; font-size:10px; padding:3px 8px;
    border-radius:5px; border:1px solid var(--border2); background:none;
    color:var(--muted); cursor:pointer; transition:all .15s;
  }
  .action-btn:hover { background:var(--surface2); color:var(--text); }
  .action-btn.danger:hover { border-color:rgba(220,80,60,.4); color:rgba(220,80,60,.8); background:rgba(220,80,60,.05); }
  .action-btn.promote { border-color:rgba(245,200,66,.3); color:var(--sun); }
  .modal-body { display:flex; flex-direction:column; gap:1.2rem; }
  .badge-list { display:flex; flex-wrap:wrap; gap:6px; }
  .user-detail-header { display:flex; align-items:center; gap:.7rem; padding-bottom:.8rem; border-bottom:1px solid var(--border); }
  .detail-section-title { font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:.6rem; }
  .diff-block { margin-bottom:.9rem; }
  .diff-block-title { font-size:11px; letter-spacing:.06em; margin-bottom:.4rem; }
  .diff-block:last-child { margin-bottom:0; }
</style>
</head>
<body>

<nav class="site-nav" style="max-width:1100px">
  <div class="nav-left">
    <button class="hamburger" onclick="toggleMenu(event)" aria-label="Menu"><span class="hline"></span><span class="hline"></span><span class="hline"></span></button>
    <div class="nav-menu" id="nav-menu">
      <a href="index.html" class="nav-menu-item">📊 Dashboard</a>
      <a href="users.html" class="nav-menu-item">👥 Utilisateurs</a>
      <a href="levels.html" class="nav-menu-item">🎮 Niveaux</a>
      <a href="daily.html" class="nav-menu-item">📅 Journaliers</a>
      <a href="badges.html" class="nav-menu-item">🏅 Badges</a>
      <a href="difficulty.html" class="nav-menu-item">⚙️ Difficultés</a>
      <div class="nav-menu-sep"></div>
      <a href="/index.html" class="nav-menu-item">← Site public</a>
      <div id="menu-auth-item"></div>
    </div>
  </div>
  <a href="/index.html" class="nav-logo">☀ Tangoléo 🌙</a>
  <div class="nav-right"><div id="nav-auth"></div></div>
</nav>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <p class="admin-nav-label">Navigation</p>
    <a href="index.html"  class="admin-nav-item">📊 Dashboard</a>
    <a href="users.html"  class="admin-nav-item active">👥 Utilisateurs</a>
    <a href="levels.html" class="admin-nav-item">🎮 Niveaux</a>
    <a href="daily.html" class="admin-nav-item">📅 Journaliers</a>
    <a href="badges.html" class="admin-nav-item">🏅 Badges</a>
    <a href="difficulty.html" class="admin-nav-item">⚙️ Difficultés</a>
    <hr class="sep">
    <a href="/index.html" class="admin-nav-item">← Site public</a>
  </aside>

  <div class="admin-content">
    <div id="loading" style="color:var(--muted);font-size:13px;padding:2rem 0">Chargement…</div>
    <div id="content" style="display:none">
      <p class="eyebrow">Administration</p>
      <h1 style="font-size:1.8rem;margin-bottom:1.5rem">Utilisateurs</h1>

      <div class="search-bar">
        <input class="form-input" type="text" id="search" placeholder="Rechercher par pseudo…" oninput="filterUsers()">
        <span id="user-count" style="font-size:12px;color:var(--muted);align-self:center;white-space:nowrap"></span>
      </div>

      <div class="card" style="padding:0;overflow:hidden">
        <table class="data-table" id="users-table">
          <thead>
            <tr>
              <th>Pseudo</th>
              <th>Rôle</th>
              <th>Parties</th>
              <th>Inscrit le</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal détail utilisateur -->
<div class="overlay" id="user-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" style="max-width:580px;max-height:88vh;overflow-y:auto">
    <div class="modal-title" id="modal-username">—</div>
    <div id="modal-body" class="modal-body"></div>
    <div style="display:flex;gap:8px;margin-top:.5rem;justify-content:flex-end">
      <button class="btn" onclick="closeModal()">Fermer</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/auth.js?v=4"></script>
<script>
let allUsers = [];
let allBadges = [];
let currentAdminId = null;

async function loadUsers() {
  const ok = await requireAdmin('/index.html');
  if (!ok) return;

  const user = await getCurrentUser();
  currentAdminId = user.id;

  const [usersRes, statsRes, badgesRes, playerBadgesRes] = await Promise.all([
    db.from('profiles').select('*').order('created_at', { ascending: false }),
    db.from('player_stats').select('user_id, difficulty, games_played'),
    db.from('badges').select('*').order('sort_order'),
    db.from('player_badges').select('user_id, badge_id')
  ]);

  allBadges = badgesRes.data || [];
  const stats       = statsRes.data || [];
  const playerBadges = playerBadgesRes.data || [];

  // Agrège les stats par user
  const statsMap = {};
  stats.forEach(s => {
    if (!statsMap[s.user_id]) statsMap[s.user_id] = 0;
    statsMap[s.user_id] += s.games_played;
  });

  const badgesMap = {};
  playerBadges.forEach(b => {
    if (!badgesMap[b.user_id]) badgesMap[b.user_id] = [];
    badgesMap[b.user_id].push(b.badge_id);
  });

  allUsers = (usersRes.data || []).map(u => ({
    ...u,
    totalGames: statsMap[u.id] || 0,
    badges: badgesMap[u.id] || []
  }));

  renderUsers(allUsers);
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = '';
  initNavAuth();
}

function renderUsers(users) {
  document.getElementById('user-count').textContent = users.length + ' utilisateur' + (users.length > 1 ? 's' : '');
  document.getElementById('users-body').innerHTML = users.map(u => `
    <tr>
      <td style="font-weight:500">${escHtml(u.username)}</td>
      <td><span class="role-chip ${u.role}">${u.role}</span></td>
      <td>${u.totalGames}</td>
      <td style="color:var(--muted)">${new Date(u.created_at).toLocaleDateString('fr-FR')}</td>
      <td>
        <div class="user-actions">
          <button class="action-btn" onclick='openUserModal(${JSON.stringify(u.id)})'>Détail</button>
          ${u.id !== currentAdminId ? (() => {
              if (u.role === 'user') return `
                <button class="action-btn" style="border-color:rgba(143,168,212,.4);color:var(--moon)" onclick='setRole("${u.id}","${escHtml(u.username)}","vip")'>✦ VIP</button>
                <button class="action-btn promote" onclick='setRole("${u.id}","${escHtml(u.username)}","admin")'>↑ Admin</button>`;
              if (u.role === 'vip') return `
                <button class="action-btn" onclick='setRole("${u.id}","${escHtml(u.username)}","user")'>↓ Joueur</button>
                <button class="action-btn promote" onclick='setRole("${u.id}","${escHtml(u.username)}","admin")'>↑ Admin</button>`;
              return `
                <button class="action-btn" style="border-color:rgba(143,168,212,.4);color:var(--moon)" onclick='setRole("${u.id}","${escHtml(u.username)}","vip")'>↓ VIP</button>
                <button class="action-btn" onclick='setRole("${u.id}","${escHtml(u.username)}","user")'>↓ Joueur</button>`;
            })() : ''}
          ${u.id !== currentAdminId
            ? `<button class="action-btn danger" onclick='deleteUserAdmin("${u.id}","${escHtml(u.username)}")'>Supprimer</button>`
            : ''}
        </div>
      </td>
    </tr>`).join('');
}

function filterUsers() {
  const q = document.getElementById('search').value.toLowerCase();
  renderUsers(q ? allUsers.filter(u => u.username.toLowerCase().includes(q)) : allUsers);
}

async function openUserModal(userId) {
  const u = allUsers.find(u => u.id === userId);
  if (!u) return;

  document.getElementById('modal-username').textContent = u.username;
  document.getElementById('modal-body').innerHTML = '<p style="font-size:12px;color:var(--muted)">Chargement…</p>';
  document.getElementById('user-modal').classList.add('show');

  const [statsRes, earnedRes] = await Promise.all([
    db.from('player_stats').select('*').eq('user_id', userId),
    db.from('player_badges').select('badge_id, earned_at').eq('user_id', userId)
  ]);

  const stats     = statsRes.data || [];
  const earned    = earnedRes.data || [];
  const earnedMap = Object.fromEntries(earned.map(b => [b.badge_id, b.earned_at]));
  const earnedIds = new Set(Object.keys(earnedMap));

  const DIFF_LABELS = { easy:'Facile', medium:'Moyen', hard:'Difficile' };
  const DIFF_COLORS = { easy:'var(--green)', medium:'var(--sun)', hard:'#d87a50' };

  // Globales
  const totalGames = stats.reduce((s, r) => s + r.games_played, 0);
  const totalTime  = stats.reduce((s, r) => s + r.total_time, 0);
  const allBests   = stats.filter(r => r.best_time > 0).map(r => r.best_time);
  const globalBest = allBests.length ? Math.min(...allBests) : 0;

  const globalHtml = `
    <div class="stats-grid">
      <div class="stat-card"><span class="stat-label">Parties jouées</span><span class="stat-val">${totalGames}</span></div>
      <div class="stat-card"><span class="stat-label">Badges obtenus</span><span class="stat-val green">${earnedIds.size}/${allBadges.length}</span></div>
      <div class="stat-card"><span class="stat-label">Meilleur temps</span><span class="stat-val best">${fmtTime(globalBest)}</span></div>
      <div class="stat-card"><span class="stat-label">Temps total</span><span class="stat-val">${fmtTime(totalTime)}</span></div>
    </div>`;

  // Par difficulté
  const diffHtml = ['easy','medium','hard'].map(diff => {
    const s = stats.find(r => r.difficulty === diff) || { games_played:0, best_time:0, total_time:0 };
    const avg = s.games_played > 0 ? Math.round(s.total_time / s.games_played) : 0;
    return `<div class="diff-block">
      <p class="diff-block-title" style="color:${DIFF_COLORS[diff]}">${DIFF_LABELS[diff]}</p>
      <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
        <div class="stat-card"><span class="stat-label">Parties</span><span class="stat-val">${s.games_played}</span></div>
        <div class="stat-card"><span class="stat-label">Meilleur</span><span class="stat-val best">${fmtTime(s.best_time)}</span></div>
        <div class="stat-card"><span class="stat-label">Moyenne</span><span class="stat-val avg">${fmtTime(avg)}</span></div>
      </div>
    </div>`;
  }).join('');

  // Badges
  const badgesHtml = allBadges.map(b => {
    const has = earnedIds.has(b.id);
    return `<span id="badge-chip-${b.id}" class="badge-chip ${has ? 'earned' : ''}" style="cursor:pointer"
      onclick='toggleBadge("${userId}","${b.id}",${has})'
      title="${has ? 'Cliquer pour retirer' : 'Cliquer pour attribuer'}">
      ${b.icon} ${escHtml(b.name)}
    </span>`;
  }).join('');

  document.getElementById('modal-body').innerHTML = `
    <div class="user-detail-header">
      <span class="role-chip ${u.role}">${u.role}</span>
      <span style="font-size:11px;color:var(--muted)">Membre depuis ${fmtDate(u.created_at)}</span>
    </div>
    <div>
      <p class="detail-section-title">Statistiques globales</p>
      ${globalHtml}
    </div>
    <div>
      <p class="detail-section-title">Par difficulté</p>
      ${diffHtml}
    </div>
    <div>
      <p class="detail-section-title">Badges — cliquer pour attribuer / retirer</p>
      <div class="badge-list">${badgesHtml || '<span style="font-size:12px;color:var(--muted)">Aucun badge défini.</span>'}</div>
    </div>`;
}

function closeModal() {
  document.getElementById('user-modal').classList.remove('show');
}

async function toggleBadge(userId, badgeId, hasIt) {
  if (hasIt) {
    if (!confirm('Retirer ce badge ?')) return;
    await db.from('player_badges').delete().eq('user_id', userId).eq('badge_id', badgeId);
    await logAdminAction('remove_badge', userId, { badge_id: badgeId });
  } else {
    await db.from('player_badges').insert({ user_id: userId, badge_id: badgeId });
    await logAdminAction('grant_badge', userId, { badge_id: badgeId });
    const badge = allBadges.find(b => b.id === badgeId);
    if (badge) { const { error: ne } = await db.from('notifications').insert({ user_id: userId, type: 'badge', payload: { badges: [badge] } }); if (ne) console.error('[notif insert error]', ne); }
  }
  await openUserModal(userId);
  loadUsers();
}

async function setRole(userId, username, newRole) {
  const labels = { user: 'Joueur', vip: 'VIP ✦', admin: 'Administrateur' };
  if (!confirm(`Changer le rôle de "${username}" en ${labels[newRole]} ?`)) return;

  const { error } = await db.from('profiles').update({ role: newRole }).eq('id', userId);
  if (error) { console.error('setRole:', error.message); return; }

  const messages = {
    admin: 'Félicitations ! Vous avez été promu administrateur.',
    vip:   'Félicitations ! Vous avez obtenu le statut VIP ✦.',
    user:  'Votre rôle a été modifié en joueur.'
  };
  const { error: ne } = await db.from('notifications').insert({
    user_id: userId, type: 'role_change', payload: { role: newRole, message: messages[newRole] }
  });
  if (ne) console.warn('role notif:', ne.message);

  await logAdminAction('set_role', userId, { new_role: newRole });
  await loadUsers();
}

async function deleteUserAdmin(userId, username) {
  if (!confirm(`Supprimer définitivement "${username}" et toutes ses données ?`)) return;
  if (!confirm('Cette action est irréversible.')) return;
  await db.from('completed_levels').delete().eq('user_id', userId);
  await db.from('player_stats').delete().eq('user_id', userId);
  await db.from('player_badges').delete().eq('user_id', userId);
  await db.from('login_logs').delete().eq('user_id', userId);
  await db.from('profiles').delete().eq('id', userId);
  await logAdminAction('delete_user', userId, { username });
  await loadUsers();
}

async function logAdminAction(action, targetId, details) {
  const admin = await getCurrentUser();
  const { error } = await db.from('admin_logs').insert({
    admin_id: admin.id, action, target_user_id: targetId, details
  });
  if (error) console.warn('admin_log:', error.message);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadUsers();
</script>
</body>
</html>
