<script>
// ═══ GAME ENGINE ═══════════════════════════════════════
const SUN=1,MOON=2,EMPTY=0,N=6;
let _animNextGrid=false;
const DIFF_LABELS={easy:'Facile',medium:'Moyen',hard:'Difficile'};
const MONTHS_FR=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

let board=[],fixed=[],puzzle=[],solution=[],ch={},cv={};
let hist=[];
let timerInt=null,timerOn=false,timerSec=0,timerDone=false;
let errRowTimers={},errColTimers={},activeErrRows=new Set(),activeErrCols=new Set(),gameWon=false;
/* Seed decoding (23 chars, base64url) */
const B64='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_';
function decodeSeed(s){
  if(s.length!==23)return null;
  const bits=[];
  for(let i=0;i<23;i++){const v=B64.indexOf(s[i]);if(v<0)return null;for(let j=5;j>=0;j--)bits.push((v>>j)&1);}
  let p=0;const nb=()=>bits[p++];
  const sol=Array.from({length:N},()=>Array(N).fill(SUN));
  for(let r=0;r<N;r++)for(let c=0;c<N;c++)sol[r][c]=nb()?MOON:SUN;
  const fix=Array.from({length:N},()=>Array(N).fill(false));
  for(let r=0;r<N;r++)for(let c=0;c<N;c++)fix[r][c]=!!nb();
  const cch={},ccv={};
  for(let r=0;r<N;r++)for(let c=0;c<N-1;c++){if(nb())cch[r+','+c]=sol[r][c]===sol[r][c+1]?'=':'×';}
  for(let r=0;r<N-1;r++)for(let c=0;c<N;c++){if(nb())ccv[r+','+c]=sol[r][c]===sol[r+1][c]?'=':'×';}
  const d0=nb(),d1=nb(),d2=nb();
  const diff=['easy','medium','hard','extreme','custom'][(d0<<2)|(d1<<1)|d2]??'custom';
  return{sol,fix,cch,ccv,diff};
}

/* Solver (7 niveaux) */
function isConsistent(b,cch,ccv){for(let r=0;r<N;r++)for(let c=0;c<N;c++){const v=b[r][c];if(v===EMPTY)continue;if(c+2<N&&b[r][c+1]===v&&b[r][c+2]===v)return false;if(r+2<N&&b[r+1][c]===v&&b[r+2][c]===v)return false;let rs=0,rm=0;b[r].forEach(x=>{if(x===SUN)rs++;if(x===MOON)rm++;});if(rs>N/2||rm>N/2)return false;let cs=0,cm=0;b.forEach(row=>{if(row[c]===SUN)cs++;if(row[c]===MOON)cm++;});if(cs>N/2||cm>N/2)return false;const kh=r+','+c;if(cch[kh]&&c+1<N&&b[r][c+1]!==EMPTY){const s=v===b[r][c+1];if((cch[kh]==='='&&!s)||(cch[kh]==='×'&&s))return false;}if(ccv[kh]&&r+1<N&&b[r+1][c]!==EMPTY){const s=v===b[r+1][c];if((ccv[kh]==='='&&!s)||(ccv[kh]==='×'&&s))return false;}}return true;}
function tTriple(b){const m=[];for(let r=0;r<N;r++)for(let c=0;c<N;c++){if(b[r][c]!==EMPTY)continue;for(const val of[SUN,MOON]){const o=val===SUN?MOON:SUN;let f=false;if(c>=2&&b[r][c-2]===val&&b[r][c-1]===val)f=true;if(c<=N-3&&b[r][c+1]===val&&b[r][c+2]===val)f=true;if(c>=1&&c<=N-2&&b[r][c-1]===val&&b[r][c+1]===val)f=true;if(f){m.push({r,c,val:o});break;}}if(b[r][c]!==EMPTY)continue;for(const val of[SUN,MOON]){const o=val===SUN?MOON:SUN;let f=false;if(r>=2&&b[r-2][c]===val&&b[r-1][c]===val)f=true;if(r<=N-3&&b[r+1][c]===val&&b[r+2][c]===val)f=true;if(r>=1&&r<=N-2&&b[r-1][c]===val&&b[r+1][c]===val)f=true;if(f){m.push({r,c,val:o});break;}}}return m;}
function tBalance(b){const m=[];for(let r=0;r<N;r++){const s=b[r].filter(v=>v===SUN).length,mn=b[r].filter(v=>v===MOON).length;if(s===N/2)b[r].forEach((v,c)=>{if(v===EMPTY)m.push({r,c,val:MOON});});if(mn===N/2)b[r].forEach((v,c)=>{if(v===EMPTY)m.push({r,c,val:SUN});});}for(let c=0;c<N;c++){const col=b.map(row=>row[c]);const s=col.filter(v=>v===SUN).length,mn=col.filter(v=>v===MOON).length;if(s===N/2)col.forEach((v,r)=>{if(v===EMPTY)m.push({r,c,val:MOON});});if(mn===N/2)col.forEach((v,r)=>{if(v===EMPTY)m.push({r,c,val:SUN});})}return m;}
function tConstraints(b,cch,ccv){const m=[];for(const[k,t]of Object.entries(cch)){const[r,c]=k.split(',').map(Number);if(c+1>=N)continue;const a=b[r][c],bv=b[r][c+1];if(a!==EMPTY&&bv===EMPTY)m.push({r,c:c+1,val:t==='='?a:(a===SUN?MOON:SUN)});if(bv!==EMPTY&&a===EMPTY)m.push({r,c,val:t==='='?bv:(bv===SUN?MOON:SUN)});}for(const[k,t]of Object.entries(ccv)){const[r,c]=k.split(',').map(Number);if(r+1>=N)continue;const a=b[r][c],bv=b[r+1][c];if(a!==EMPTY&&bv===EMPTY)m.push({r:r+1,c,val:t==='='?a:(a===SUN?MOON:SUN)});if(bv!==EMPTY&&a===EMPTY)m.push({r,c,val:t==='='?bv:(bv===SUN?MOON:SUN)});}return m;}
function tPairEnd(b){const m=[];const opp=v=>v===SUN?MOON:SUN;for(let r=0;r<N;r++){if(b[r][0]!==EMPTY&&b[r][0]===b[r][1]&&b[r][5]===EMPTY)m.push({r,c:5,val:opp(b[r][0])});if(b[r][4]!==EMPTY&&b[r][4]===b[r][5]&&b[r][0]===EMPTY)m.push({r,c:0,val:opp(b[r][4])});}for(let c=0;c<N;c++){if(b[0][c]!==EMPTY&&b[0][c]===b[1][c]&&b[5][c]===EMPTY)m.push({r:5,c,val:opp(b[0][c])});if(b[4][c]!==EMPTY&&b[4][c]===b[5][c]&&b[0][c]===EMPTY)m.push({r:0,c,val:opp(b[4][c])});}return m;}
function tDistIdent(b){const m=[];const opp=v=>v===SUN?MOON:SUN;for(let r=0;r<N;r++){const a=b[r][0],f=b[r][5];if(a!==EMPTY&&a===f){const o=opp(a);if(b[r][1]===EMPTY)m.push({r,c:1,val:o});if(b[r][4]===EMPTY)m.push({r,c:4,val:o});}}for(let c=0;c<N;c++){const a=b[0][c],f=b[5][c];if(a!==EMPTY&&a===f){const o=opp(a);if(b[1][c]===EMPTY)m.push({r:1,c,val:o});if(b[4][c]===EMPTY)m.push({r:4,c,val:o});}}return m;}
function tDist4(b){const m=[];const opp=v=>v===SUN?MOON:SUN;for(let r=0;r<N;r++){const a=b[r][0],e=b[r][4];if(a!==EMPTY&&a===e&&b[r][5]===EMPTY)m.push({r,c:5,val:opp(a)});const bb=b[r][1],f=b[r][5];if(bb!==EMPTY&&bb===f&&b[r][0]===EMPTY)m.push({r,c:0,val:opp(bb)});}for(let c=0;c<N;c++){const a=b[0][c],e=b[4][c];if(a!==EMPTY&&a===e&&b[5][c]===EMPTY)m.push({r:5,c,val:opp(a)});const bb=b[1][c],f=b[5][c];if(bb!==EMPTY&&bb===f&&b[0][c]===EMPTY)m.push({r:0,c,val:opp(bb)});}return m;}
function tXBalance(b,cch,ccv){const m=[];for(let r=0;r<N;r++){const empty=[];for(let c=0;c<N;c++)if(b[r][c]===EMPTY)empty.push(c);const ns=b[r].filter(v=>v===SUN).length,nm=b[r].filter(v=>v===MOON).length;if(empty.length===3){for(let i=0;i<3;i++){const c3=empty[i],c1=empty[(i+1)%3],c2=empty[(i+2)%3];const lo=Math.min(c1,c2),hi=Math.max(c1,c2);if(hi-lo!==1||cch[r+','+lo]!=='×')continue;const ns2=3-ns-1,nm2=3-nm-1;if(ns2===1&&nm2===0)m.push({r,c:c3,val:SUN,tip:'xbal-row'});else if(ns2===0&&nm2===1)m.push({r,c:c3,val:MOON,tip:'xbal-row'});}}if(empty.length===4&&(ns===2||nm===2)){const val=ns===2?MOON:SUN;for(let i=0;i<4;i++)for(let j=i+1;j<4;j++){const c1=empty[i],c2=empty[j],lo=Math.min(c1,c2),hi=Math.max(c1,c2);if(hi-lo!==1||cch[r+','+lo]!=='×')continue;empty.filter((_,idx)=>idx!==i&&idx!==j).forEach(c=>m.push({r,c,val,tip:'xbal-row'}));}}}for(let c=0;c<N;c++){const empty=[];for(let r=0;r<N;r++)if(b[r][c]===EMPTY)empty.push(r);const ns=b.map(row=>row[c]).filter(v=>v===SUN).length,nm=b.map(row=>row[c]).filter(v=>v===MOON).length;if(empty.length===3){for(let i=0;i<3;i++){const r3=empty[i],r1=empty[(i+1)%3],r2=empty[(i+2)%3];const lo=Math.min(r1,r2),hi=Math.max(r1,r2);if(hi-lo!==1||ccv[lo+','+c]!=='×')continue;const ns2=3-ns-1,nm2=3-nm-1;if(ns2===1&&nm2===0)m.push({r:r3,c,val:SUN,tip:'xbal-col'});else if(ns2===0&&nm2===1)m.push({r:r3,c,val:MOON,tip:'xbal-col'});}}if(empty.length===4&&(ns===2||nm===2)){const val=ns===2?MOON:SUN;for(let i=0;i<4;i++)for(let j=i+1;j<4;j++){const r1=empty[i],r2=empty[j],lo=Math.min(r1,r2),hi=Math.max(r1,r2);if(hi-lo!==1||ccv[lo+','+c]!=='×')continue;empty.filter((_,idx)=>idx!==i&&idx!==j).forEach(r=>m.push({r,c,val,tip:'xbal-col'}));}}}return m;}
function tElim(b,cch,ccv){const m=[];for(let r=0;r<N;r++)for(let c=0;c<N;c++){if(b[r][c]!==EMPTY)continue;let cS=true,cM=true;for(const val of[SUN,MOON]){const b2=b.map(row=>[...row]);b2[r][c]=val;if(!isConsistent(b2,cch,ccv)){if(val===SUN)cS=false;else cM=false;}}if(!cS&&cM)m.push({r,c,val:MOON});if(!cM&&cS)m.push({r,c,val:SUN});}return m;}
const SOLVE_LEVELS=[
  {level:1,fn:(b,ch,cv)=>tTriple(b)},
  {level:2,fn:(b,ch,cv)=>tBalance(b)},
  {level:3,fn:(b,ch,cv)=>tConstraints(b,ch,cv)},
  {level:4,fn:(b,ch,cv)=>tPairEnd(b)},
  {level:5,fn:(b,ch,cv)=>tDistIdent(b)},
  {level:6,fn:(b,ch,cv)=>tDist4(b)},
  {level:7,fn:(b,ch,cv)=>tXBalance(b,ch,cv)},
  {level:8,fn:(b,ch,cv)=>tElim(b,ch,cv)},
];
function humanSolve(puz,cch,ccv,maxLevel=7){
  const b=puz.map(r=>[...r]);let highestLevel=0;
  outer:for(let i=0;i<200;i++){
    for(const{level,fn}of SOLVE_LEVELS){
      if(level>maxLevel)break;
      const moves=fn(b,cch,ccv).filter(({r,c})=>b[r][c]===EMPTY);
      if(moves.length){for(const{r,c,val}of moves)if(b[r][c]===EMPTY)b[r][c]=val;if(level>highestLevel)highestLevel=level;continue outer;}
    }
    break;
  }
  return{solved:b.every(row=>row.every(v=>v!==EMPTY)),level:highestLevel};
}

/* Generator */
let DIFF_PARAMS={
  easy:   {cluesMin:14,cluesMax:20,constraintsMin:18,constraintsMax:26,eqRatioMin:0.60,eqRatioMax:0.80,techMin:1,techMax:3},
  medium: {cluesMin:8, cluesMax:14,constraintsMin:10,constraintsMax:18,eqRatioMin:0.40,eqRatioMax:0.65,techMin:3,techMax:5},
  hard:   {cluesMin:4, cluesMax:9, constraintsMin:3, constraintsMax:10,eqRatioMin:0.30,eqRatioMax:0.55,techMin:5,techMax:8},
  extreme:{cluesMin:2, cluesMax:6, constraintsMin:5, constraintsMax:12, eqRatioMin:0.00,eqRatioMax:0.10,techMin:5,techMax:8},
};
function isValid(b,r,c,val){const h=N/2;let rs=0,rm=0;for(let i=0;i<N;i++){if(b[r][i]===SUN)rs++;if(b[r][i]===MOON)rm++;}if(val===SUN&&rs>=h)return false;if(val===MOON&&rm>=h)return false;let cs=0,cm=0;for(let i=0;i<N;i++){if(b[i][c]===SUN)cs++;if(b[i][c]===MOON)cm++;}if(val===SUN&&cs>=h)return false;if(val===MOON&&cm>=h)return false;if(c>=2&&b[r][c-1]===val&&b[r][c-2]===val)return false;if(c>=1&&c<N-1&&b[r][c-1]===val&&b[r][c+1]===val)return false;if(c<N-2&&b[r][c+1]===val&&b[r][c+2]===val)return false;if(r>=2&&b[r-1][c]===val&&b[r-2][c]===val)return false;if(r>=1&&r<N-1&&b[r-1][c]===val&&b[r+1][c]===val)return false;if(r<N-2&&b[r+1][c]===val&&b[r+2][c]===val)return false;return true;}
function countBT(b,cch,ccv,lim){let cnt=0;const brd=b.map(r=>[...r]);function bt(){if(cnt>=lim)return;for(let r=0;r<N;r++)for(let c=0;c<N;c++){if(brd[r][c]===EMPTY){for(const val of[SUN,MOON]){if(!isValid(brd,r,c,val))continue;let ok=true;const kh=r+','+c;if(cch[kh]&&c+1<N&&brd[r][c+1]!==EMPTY){const s=val===brd[r][c+1];if((cch[kh]==='='&&!s)||(cch[kh]==='×'&&s))ok=false;}const khl=r+','+(c-1);if(ok&&c>0&&cch[khl]&&brd[r][c-1]!==EMPTY){const s=val===brd[r][c-1];if((cch[khl]==='='&&!s)||(cch[khl]==='×'&&s))ok=false;}const kv=r+','+c;if(ok&&ccv[kv]&&r+1<N&&brd[r+1][c]!==EMPTY){const s=val===brd[r+1][c];if((ccv[kv]==='='&&!s)||(ccv[kv]==='×'&&s))ok=false;}const kvl=(r-1)+','+c;if(ok&&r>0&&ccv[kvl]&&brd[r-1][c]!==EMPTY){const s=val===brd[r-1][c];if((ccv[kvl]==='='&&!s)||(ccv[kvl]==='×'&&s))ok=false;}if(ok){brd[r][c]=val;bt();brd[r][c]=EMPTY;}}return;}}cnt++;}bt();return cnt;}
function genSolution(){const b=Array.from({length:N},()=>Array(N).fill(EMPTY));function fill(pos){if(pos===N*N)return true;const r=Math.floor(pos/N),c=pos%N;const vals=Math.random()<.5?[SUN,MOON]:[MOON,SUN];for(const v of vals){if(isValid(b,r,c,v)){b[r][c]=v;if(fill(pos+1))return true;b[r][c]=EMPTY;}}return false;}return fill(0)?b:null;}
function placeConstraints(sol,targetCount,eqRatio){
  const eqPool=[],xPool=[];
  for(let r=0;r<N;r++)for(let c=0;c<N-1;c++){(sol[r][c]===sol[r][c+1]?eqPool:xPool).push({r,c,dir:'h'});}
  for(let r=0;r<N-1;r++)for(let c=0;c<N;c++){(sol[r][c]===sol[r+1][c]?eqPool:xPool).push({r,c,dir:'v'});}
  eqPool.sort(()=>Math.random()-.5);xPool.sort(()=>Math.random()-.5);
  const eqCount=Math.min(Math.round(targetCount*eqRatio),eqPool.length);
  const xCount=Math.min(targetCount-eqCount,xPool.length);
  const cch={},ccv={};
  for(const{r,c,dir}of[...eqPool.slice(0,eqCount),...xPool.slice(0,xCount)]){
    if(dir==='h')cch[r+','+c]=sol[r][c]===sol[r][c+1]?'=':'×';
    else ccv[r+','+c]=sol[r][c]===sol[r+1][c]?'=':'×';
  }
  return{cch,ccv};
}
function carve(sol,cch,ccv,targetClues,maxLevel){
  const puz=sol.map(r=>[...r]);
  const cells=[];for(let r=0;r<N;r++)for(let c=0;c<N;c++)cells.push([r,c]);
  cells.sort(()=>Math.random()-.5);
  for(const[r,c]of cells){
    if(puz.flat().filter(v=>v!==EMPTY).length<=targetClues)break;
    const sv=puz[r][c];puz[r][c]=EMPTY;
    const{solved}=humanSolve(puz,cch,ccv,maxLevel);
    if(!solved)puz[r][c]=sv;
  }
  return puz;
}
function genForDiff(diff){
  const p=DIFF_PARAMS[diff]||DIFF_PARAMS.medium;
  for(let att=0;att<500;att++){
    const sol=genSolution();if(!sol)continue;
    const targetConstraints=Math.floor(Math.random()*(p.constraintsMax-p.constraintsMin+1))+p.constraintsMin;
    const targetEqRatio=p.eqRatioMin+Math.random()*(p.eqRatioMax-p.eqRatioMin);
    const{cch,ccv}=placeConstraints(sol,targetConstraints,targetEqRatio);
    const targetClues=Math.floor(Math.random()*(p.cluesMax-p.cluesMin+1))+p.cluesMin;
    const puz=carve(sol,cch,ccv,targetClues,p.techMax);
    const{solved,level}=humanSolve(puz,cch,ccv,p.techMax);
    if(!solved)continue;
    if(level<p.techMin)continue;
    if(countBT(puz,cch,ccv,2)!==1)continue;
    return{puzzle:puz,solution:sol,ch:cch,cv:ccv};
  }
  return null;
}


/* Errors */
function getErrorLines(){
  const rows=new Set(),cols=new Set();
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const v=board[r][c];if(v===EMPTY)continue;
    if(c+2<N&&board[r][c+1]===v&&board[r][c+2]===v)rows.add(r);
    if(r+2<N&&board[r+1][c]===v&&board[r+2][c]===v)cols.add(c);
    const kh=r+','+c;
    if(ch[kh]&&c+1<N&&board[r][c+1]!==EMPTY){const s=v===board[r][c+1];if((ch[kh]==='='&&!s)||(ch[kh]==='×'&&s))rows.add(r);}
    if(cv[kh]&&r+1<N&&board[r+1][c]!==EMPTY){const s=v===board[r+1][c];if((cv[kh]==='='&&!s)||(cv[kh]==='×'&&s))cols.add(c);}
  }
  for(let r=0;r<N;r++)for(const val of[SUN,MOON])if(board[r].filter(v=>v===val).length>N/2)rows.add(r);
  for(let c=0;c<N;c++)for(const val of[SUN,MOON])if(board.map(row=>row[c]).filter(v=>v===val).length>N/2)cols.add(c);
  return{rows,cols};
}
function hasError(){const e=getErrorLines();return e.rows.size>0||e.cols.size>0;}
function isCellErr(r,c){return activeErrRows.has(r)||activeErrCols.has(c);}
function applyErrClasses(){
  const trs=document.getElementById('grid').querySelectorAll('tr');
  for(let r=0;r<N;r++){const cells=trs[r]&&trs[r].querySelectorAll('.ci');if(!cells)continue;for(let c=0;c<N;c++)if(cells[c])cells[c].classList.toggle('err',isCellErr(r,c));}
}
function shakeErrLine(type,idx){
  if(typeof SOUND!=='undefined')SOUND.error();
  if(typeof ANIM==='undefined')return;
  const trs=document.getElementById('grid').querySelectorAll('tr');
  if(type==='row'){const cells=trs[idx]&&trs[idx].querySelectorAll('.ci');for(let c=0;c<N;c++)if(board[idx][c]!==EMPTY&&cells&&cells[c])ANIM.error(cells[c]);}
  else{for(let r=0;r<N;r++){const cell=trs[r]&&trs[r].querySelectorAll('.ci')[idx];if(board[r][idx]!==EMPTY&&cell)ANIM.error(cell);}}
}
function updateErrorTimers(){
  const{rows:curR,cols:curC}=getErrorLines();
  curR.forEach(r=>{if(!activeErrRows.has(r)&&!errRowTimers[r])errRowTimers[r]=setTimeout(()=>{delete errRowTimers[r];if(getErrorLines().rows.has(r)){activeErrRows.add(r);applyErrClasses();shakeErrLine('row',r);}},1000);});
  curC.forEach(c=>{if(!activeErrCols.has(c)&&!errColTimers[c])errColTimers[c]=setTimeout(()=>{delete errColTimers[c];if(getErrorLines().cols.has(c)){activeErrCols.add(c);applyErrClasses();shakeErrLine('col',c);}},1000);});
  [...Object.keys(errRowTimers).map(Number),...activeErrRows].forEach(r=>{if(!curR.has(r)){if(errRowTimers[r]){clearTimeout(errRowTimers[r]);delete errRowTimers[r];}if(activeErrRows.delete(r))applyErrClasses();}});
  [...Object.keys(errColTimers).map(Number),...activeErrCols].forEach(c=>{if(!curC.has(c)){if(errColTimers[c]){clearTimeout(errColTimers[c]);delete errColTimers[c];}if(activeErrCols.delete(c))applyErrClasses();}});
}
function clearAllErrors(){Object.values(errRowTimers).forEach(t=>clearTimeout(t));Object.values(errColTimers).forEach(t=>clearTimeout(t));errRowTimers={};errColTimers={};activeErrRows=new Set();activeErrCols=new Set();}

/* Render */
function renderGrid(){
  const tbl=document.getElementById('grid');tbl.innerHTML='';
  for(let r=0;r<N;r++){const tr=document.createElement('tr');for(let c=0;c<N;c++){const td=document.createElement('td');const key=r+','+c;const inner=document.createElement('div');inner.className='ci'+(fixed[r][c]?' fx':'')+(isCellErr(r,c)?' err':'');setCellSymbol(inner,board[r][c]);if(!fixed[r][c]&&!gameWon){inner.addEventListener('click',e=>{e.preventDefault();cycleCell(r,c,1);});inner.addEventListener('contextmenu',e=>{e.preventDefault();cycleCell(r,c,-1);});}if(ch[key]&&c<N-1){const sp=document.createElement('span');sp.className='cn h';sp.textContent=ch[key];td.appendChild(sp);}if(cv[key]&&r<N-1){const sp=document.createElement('span');sp.className='cn v';sp.textContent=cv[key];td.appendChild(sp);}td.appendChild(inner);tr.appendChild(td);}tbl.appendChild(tr);}
  const undoBtn=document.getElementById('btn-undo');if(undoBtn)undoBtn.disabled=hist.length===0||gameWon;
  if(_animNextGrid){
    _animNextGrid=false;
    const cells=[...tbl.querySelectorAll('.ci')];
    if(typeof ANIM!=='undefined')ANIM.gridLoad(cells);
  }
}

function renderMiniGrid(puzData,targetId,miniClass){
  const tbl=document.getElementById(targetId);if(!tbl)return;tbl.innerHTML='';
  const p=puzData.puzzle,c_h=puzData.ch,c_v=puzData.cv;
  for(let r=0;r<N;r++){const tr=document.createElement('tr');for(let c=0;c<N;c++){const td=document.createElement('td');const key=r+','+c;const inner=document.createElement('div');inner.className='ci'+(p[r][c]!==EMPTY?' fx':'')+(miniClass?' '+miniClass:'');setCellSymbol(inner,p[r][c]);if(c_h[key]&&c<N-1){const sp=document.createElement('span');sp.className='cn h';sp.textContent=c_h[key];td.appendChild(sp);}if(c_v[key]&&r<N-1){const sp=document.createElement('span');sp.className='cn v';sp.textContent=c_v[key];td.appendChild(sp);}td.appendChild(inner);tr.appendChild(td);}tbl.appendChild(tr);}
}

/* Timer */
function fmt(s){if(s>=3600){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return h+':'+(m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;}const m=Math.floor(s/60),ss=s%60;return m+':'+(ss<10?'0':'')+ss;}
function startTimer(){if(timerOn)return;timerOn=true;document.getElementById('tdot').className='tdot run';clearInterval(timerInt);timerInt=setInterval(()=>{timerSec++;document.getElementById('tval').textContent=fmt(timerSec);},1000);}
function stopTimer(){clearInterval(timerInt);timerOn=false;document.getElementById('tdot').className='tdot done';}
function resetTimer(){clearInterval(timerInt);timerOn=false;timerSec=0;timerDone=false;document.getElementById('tval').textContent='0:00';document.getElementById('tdot').className='tdot';}

/* Game logic */
function animLineComplete(r,c,prev,next){
  if(prev!==EMPTY||next===EMPTY)return;
  const rows=document.getElementById('grid').querySelectorAll('tr');
  const rowDone=board[r].every(v=>v!==EMPTY);
  const colDone=board.every(row=>row[c]!==EMPTY);
  if(typeof ANIM!=='undefined'){
    if(rowDone){const cells=[...rows[r].querySelectorAll('.ci')];ANIM.lineGlow(c>=N/2?cells:[...cells].reverse());}
    if(colDone){const colCells=[...rows].map(tr=>tr.querySelectorAll('.ci')[c]);ANIM.lineGlow(r<N/2?[...colCells].reverse():colCells);}
  }
  if((rowDone||colDone)&&typeof SOUND!=='undefined')SOUND.lineComplete();
}
function cellEl(r,c){const tr=document.getElementById('grid').querySelectorAll('tr')[r];return tr?tr.querySelectorAll('.ci')[c]:null;}
function cycleCell(r,c,dir){
  if(gameWon)return;
  const prev=board[r][c];
  hist.push({r,c,prev});board[r][c]=((board[r][c]+dir+3)%3);
  const next=board[r][c];
  // Mise à jour en place (pas de rebuild) → les animations en cours survivent
  const el=cellEl(r,c);
  if(el)setCellSymbol(el,next);
  updateErrorTimers();
  if(el&&typeof ANIM!=='undefined'){next===EMPTY?ANIM.erase(el):ANIM.place(el);}
  if(typeof SOUND!=='undefined'){next===EMPTY?SOUND.erase():SOUND.place(next);}
  animLineComplete(r,c,prev,next);
  const undoBtn=document.getElementById('btn-undo');if(undoBtn)undoBtn.disabled=hist.length===0||gameWon;
  if(board.every(row=>row.every(v=>v!==EMPTY)))checkWin();
}
function undo(){
  if(!hist.length||gameWon)return;
  const{r,c,prev}=hist.pop();board[r][c]=prev;
  const el=cellEl(r,c);if(el)setCellSymbol(el,prev);
  updateErrorTimers();
  const undoBtn=document.getElementById('btn-undo');if(undoBtn)undoBtn.disabled=hist.length===0||gameWon;
}
function resetPuzzle(){clearAllErrors();board=puzzle.map(r=>[...r]);hist=[];gameWon=false;renderGrid();}

async function checkWin(){
  if(hasError())return;
  for(let r=0;r<N;r++)if(board[r].filter(v=>v===SUN).length!==N/2)return;
  for(let c=0;c<N;c++)if(board.map(row=>row[c]).filter(v=>v===SUN).length!==N/2)return;
  clearAllErrors();stopTimer();timerDone=true;gameWon=true;
  if(typeof ANIM!=='undefined'){
    const cells=[...document.getElementById('grid').querySelectorAll('.ci')];
    ANIM.winCascade(cells);
  }
  if(typeof SOUND!=='undefined')SOUND.win();
  const elapsed=timerSec;

  // Affichage immédiat du résultat, sans flouter la grille (cascade visible).
  // Le panneau (fond transparent) + la carte en verre dépoli ne masquent pas la cascade.
  document.getElementById('overlay-start').style.display='none';
  document.getElementById('play-controls').style.display='none';
  document.getElementById('result-time').textContent=fmt(elapsed);
  document.getElementById('result-panel').style.display='flex';

  // Sauvegarde + récompenses + classement en arrière-plan
  (async()=>{
    if(currentUserId&&currentDailyLevel&&!currentIsReplay){
      const diff=currentDailyLevel.difficulty||'medium';

      // Récompenses daily (XP, streak, bonus)
      const rewards=await saveDailyResult(currentUserId,diff,elapsed);
      if(rewards.is_new_day!==false){
        _showDailyRewards(rewards,elapsed);
        if(rewards.coins_earned>0)updateNavCoins((await db.from('profiles').select('coins').eq('id',currentUserId).maybeSingle()).data?.coins||0);
      }

      const{data:saved,error}=await db.from('daily_completions').insert({
        user_id:currentUserId,daily_level_id:currentDailyLevel.id,time_seconds:elapsed
      }).select().single();
      if(error&&!error.message.includes('unique'))console.warn('daily save:',error.message);
      else if(saved){
        completionsCache[currentDailyLevel.id]=saved;
        renderCalendar();
        document.getElementById('mini-grid-wrap')?.classList.remove('blurred');
        document.getElementById('mini-overlay').style.display='none';
        const actEl=document.getElementById('detail-actions');
        if(actEl)actEl.innerHTML=`<span style="font-size:12px;color:var(--green)">✓ Complété en ${fmt(elapsed)}</span>`;
      }
      try{localStorage.removeItem('daily_timer_'+getParisTodayStr());}catch(e){}
    }
    await showResultLeaderboard(currentDailyLevel?.id,elapsed);
  })();

function _showDailyRewards(r,elapsed){
  const wrap=document.getElementById('daily-rewards');
  if(!wrap)return;
  wrap.style.display='';
  const xpEl=document.getElementById('dr-xp');
  const coinsEl=document.getElementById('dr-coins');
  const streakEl=document.getElementById('dr-streak');
  xpEl.textContent='+'+r.xp_earned+' XP';
  coinsEl.textContent='+'+r.coins_earned+' 🪙';
  streakEl.textContent='🔥 Streak ×'+(r.streak_multiplier||1).toFixed(2);
  [xpEl,coinsEl,streakEl].forEach(el=>{el.style.animation='none';void el.offsetWidth;el.style.animation='rewardPop .4s cubic-bezier(.17,.67,.4,1.4) forwards';});
  document.getElementById('dr-level-num').textContent=r.new_level;
  document.getElementById('dr-xp-text').textContent=r.xp_in_level+' / '+r.xp_to_next+' XP';
  const fill=document.getElementById('dr-xp-fill');
  if(fill){fill.style.width='0%';setTimeout(()=>{fill.style.width=Math.round(r.xp_in_level/r.xp_to_next*100)+'%';},100);}
  const banner=document.getElementById('dr-levelup-banner');
  if(banner){banner.style.display=r.leveled_up?'':'none';}
}
}

let currentUserId=null;
let currentDailyLevel=null;
let currentIsReplay=false;
let calYear,calMonth;
let levelsCache={};    // date→level
let completionsCache={};// daily_level_id→completion

function getParisTodayStr(){
  return new Intl.DateTimeFormat('fr-CA',{timeZone:'Europe/Paris'}).format(new Date());
}


async function init(){
  const user=await initNavAuth();
  _initCalDrag();
  currentUserId=user?.id||null;

  // Charger les paramètres de difficulté depuis la DB
  try{
    const{data}=await db.from('difficulty_params').select('*');
    if(data&&data.length){
      data.forEach(p=>{
        if(DIFF_PARAMS[p.id])DIFF_PARAMS[p.id]={
          cluesMin:p.clues_min,cluesMax:p.clues_max,
          constraintsMin:p.constraints_min,constraintsMax:p.constraints_max,
          eqRatioMin:p.eq_ratio_min,eqRatioMax:p.eq_ratio_max,
          techMin:p.tech_min,techMax:p.tech_max,
        };
      });
    }
  }catch(e){}

  const today=getParisTodayStr();
  const[levelRes]=await Promise.all([
    db.from('daily_levels').select('*').eq('date',today).maybeSingle()
  ]);
  currentDailyLevel=levelRes.data;

  if(!currentDailyLevel){
    // No level today
    showView('catalogue');
    await loadCatalogue();
    return;
  }

  if(!currentUserId){
    showView('catalogue');
    await loadCatalogue(today);
    return;
  }

  // Check if already completed today
  const{data:comp}=await db.from('daily_completions').select('*')
    .eq('user_id',currentUserId).eq('daily_level_id',currentDailyLevel.id).maybeSingle();

  if(comp){
    showView('catalogue');
    await loadCatalogue(today);
    return;
  }

  // Check if timer already started (resume)
  const timerKey='daily_timer_'+today;
  let startTime=null;
  try{startTime=parseInt(localStorage.getItem(timerKey));}catch(e){}

  // Show play view
  loadAndRenderPuzzle(currentDailyLevel);
  document.getElementById('level-label').textContent=
    currentDailyLevel.name||'Niveau du '+formatDate(today);
  showView('play');

  if(startTime&&!isNaN(startTime)){
    // Resume timer
    timerSec=Math.max(0,Math.floor((Date.now()-startTime)/1000));
    document.getElementById('tval').textContent=fmt(timerSec);
    document.getElementById('grid-wrap').classList.remove('blurred');
    document.getElementById('overlay-start').style.display='none';
    document.getElementById('play-controls').style.display='flex';
    startTimer();
  }
}

function loadAndRenderPuzzle(level){
  const decoded=decodeSeed(level.seed);
  if(!decoded)return;
  const{sol,fix,cch,ccv}=decoded;
  solution=sol;ch=cch;cv=ccv;
  puzzle=Array.from({length:N},()=>Array(N).fill(EMPTY));
  for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(fix[r][c])puzzle[r][c]=sol[r][c];
  board=puzzle.map(r=>[...r]);
  fixed=fix;
  hist=[];gameWon=false;clearAllErrors();
  _animNextGrid=true;renderGrid();
}

function startDaily(){
  if(!currentUserId){document.getElementById('login-modal').classList.add('show');return;}
  const today=getParisTodayStr();
  try{localStorage.setItem('daily_timer_'+today,Date.now());}catch(e){}
  document.getElementById('grid-wrap').classList.remove('blurred');
  document.getElementById('overlay-start').style.display='none';
  document.getElementById('play-controls').style.display='flex';
  resetTimer();timerSec=0;startTimer();
}

/* ── Leaderboard ── */
async function fetchLeaderboard(levelId){
  const{data}=await db.from('daily_completions')
    .select('time_seconds,completed_at,profiles(username)')
    .eq('daily_level_id',levelId)
    .order('time_seconds',{ascending:true})
    .limit(50);
  return data||[];
}

function renderLeaderboard(rows,currentUid,userTime,containerId){
  const el=document.getElementById(containerId);if(!el)return;
  if(!rows.length){el.innerHTML='<p style="font-size:12px;color:var(--muted)">Aucun score encore.</p>';return;}

  const userRow=rows.find(r=>r.profiles?.username&&currentUid&&
    rows.findIndex(x=>x===r)>=0&&userTime&&r.time_seconds===userTime);
  const userIdx=currentUid?rows.findIndex(r=>{
    // find by matching time+username if available
    return false; // placeholder, real search below
  }):-1;

  // Find user's rank
  let myRank=-1;
  if(currentUid){
    // We need to know the user's actual time for this level
    // passed as userTime parameter
    if(userTime!==null&&userTime!==undefined){
      myRank=rows.findIndex(r=>r.time_seconds===userTime);
    }
  }

  const medals=['🥇','🥈','🥉'];
  let html='';
  const top10=rows.slice(0,10);
  top10.forEach((r,i)=>{
    const isMe=myRank===i;
    const rank=medals[i]||(i+1);
    html+=`<div class="lb-row">
      <span class="lb-rank ${i<3?['gold','silver','bronze'][i]:''}">${rank}</span>
      <span class="lb-name${isMe?' me':''}">${escHtml(r.profiles?.username||'—')}</span>
      <span class="lb-time">${fmt(r.time_seconds)}</span>
    </div>`;
  });

  if(myRank>=10){
    // Show neighbors
    const above=rows[myRank-1];
    const me=rows[myRank];
    const below=rows[myRank+1];
    html+=`<div class="lb-sep">···</div>`;
    if(above)html+=`<div class="lb-row"><span class="lb-rank">${myRank}</span><span class="lb-name">${escHtml(above.profiles?.username||'—')}</span><span class="lb-time">${fmt(above.time_seconds)}</span></div>`;
    html+=`<div class="lb-row"><span class="lb-rank" style="color:var(--moon)">${myRank+1}</span><span class="lb-name me">${escHtml(me.profiles?.username||'—')}</span><span class="lb-time">${fmt(me.time_seconds)}</span></div>`;
    if(below)html+=`<div class="lb-row"><span class="lb-rank">${myRank+2}</span><span class="lb-name">${escHtml(below.profiles?.username||'—')}</span><span class="lb-time">${fmt(below.time_seconds)}</span></div>`;
  } else if(myRank===-1&&currentUid&&rows.length>=50){
    html+=`<div class="lb-sep">Votre classement : +50</div>`;
  }

  el.innerHTML=html;
}

async function showResultLeaderboard(levelId,myTime){
  if(!levelId)return;
  const rows=await fetchLeaderboard(levelId);
  const myRankRow=rows.findIndex(r=>r.time_seconds===myTime&&
    currentUserId&&r.profiles);
  const rankText=myRankRow>=0?`#${myRankRow+1} sur ${rows.length}`:(rows.length>=50?'+50':'—');
  document.getElementById('result-rank').textContent=rankText;

/* ── Calendar ── */
let selectedCalDate=null;

async function loadCatalogue(selectDate){
  const target=selectDate||getParisTodayStr();
  const d=new Date(target+'T00:00:00');
  calYear=d.getFullYear();calMonth=d.getMonth();
  await loadMonthData();
  await selectCalDay(target);
}

async function loadMonthData(doRender=true){
  const firstDay=`${calYear}-${String(calMonth+1).padStart(2,'0')}-01`;
  const lastDay=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${new Date(calYear,calMonth+1,0).getDate()}`;
  const[levRes,compRes]=await Promise.all([
    db.from('daily_levels').select('*').gte('date',firstDay).lte('date',lastDay),
    currentUserId?db.from('daily_completions').select('*,daily_levels!inner(date)')
      .eq('user_id',currentUserId).gte('daily_levels.date',firstDay).lte('daily_levels.date',lastDay):Promise.resolve({data:[]})
  ]);
  (levRes.data||[]).forEach(l=>{levelsCache[l.date]=l;});
  (compRes.data||[]).forEach(c=>{completionsCache[c.daily_level_id]=c;});
  if(doRender){renderCalendar();_calSetSizes();}
}

const MIN_CAL_YEAR=2026, MIN_CAL_MONTH=4; // Mai 2026

function renderCalendar(){
  const today=getParisTodayStr();
  document.getElementById('cal-label').textContent=`${MONTHS_FR[calMonth]} ${calYear}`;

  // Prev/next month data
  let pm=calMonth-1,py=calYear; if(pm<0){pm=11;py--;}
  let nm=calMonth+1,ny=calYear; if(nm>11){nm=0;ny++;}

  renderMonthSlide('slide-prev',py,pm);
  renderMonthSlide('slide-curr',calYear,calMonth);
  renderMonthSlide('slide-next',ny,nm);

  // Completion counter: done / total jours du mois
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  let done=0;
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const level=levelsCache[dateStr];
    if(level&&completionsCache[level.id])done++;
  }
  document.getElementById('cal-completion').textContent=currentUserId?`${done} / ${daysInMonth}`:'';

  // Prev button disabled at min month
  const prevBtn=document.getElementById('btn-prev-cal');
  if(prevBtn)prevBtn.disabled=(calYear<=MIN_CAL_YEAR&&calMonth<=MIN_CAL_MONTH);

  // "go to selected" button: visible if selection exists, disabled if already at selected month
  const goBtn=document.getElementById('btn-go-selected');
  if(goBtn&&selectedCalDate){
    const selYear=parseInt(selectedCalDate.slice(0,4));
    const selMonth=parseInt(selectedCalDate.slice(5,7))-1;
    const isDifferent=(selYear!==calYear||selMonth!==calMonth);
    goBtn.style.display='';
    goBtn.disabled=!isDifferent;
  }else if(goBtn){
    goBtn.style.display='none';
  }
}

function renderMonthSlide(slideId,year,month){
  const today=getParisTodayStr();
  const daysInMonth=new Date(year,month+1,0).getDate();
  let firstWeekday=new Date(year,month,1).getDay();
  firstWeekday=firstWeekday===0?6:firstWeekday-1;
  let html='';
  for(let i=0;i<firstWeekday;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const level=levelsCache[dateStr];
    const isFuture=dateStr>today;
    const comp=level?completionsCache[level.id]:null;
    const isSelected=dateStr===selectedCalDate;
    let cls='cal-day';
    if(isFuture)cls+=' future';
    else if(comp)cls+=' done';
    else if(dateStr===today)cls+=' today';
    if(isSelected)cls+=' selected';
    const click=!isFuture?`onclick="selectCalDay('${dateStr}')"` :'';
    html+=`<div class="${cls}" ${click}>${d}</div>`;
  }
  // Compléter à 42 cellules (6 semaines) pour hauteur uniforme
  const cellCount=firstWeekday+daysInMonth;
  for(let i=cellCount;i<42;i++)html+=`<div class="cal-day empty"></div>`;
  const el=document.getElementById(slideId);
  if(el)el.innerHTML=html;
}

let _calDragging=false,_calDragX=0,_calAnimating=false,_calHasMoved=false;

function _calW(){ return document.getElementById('cal-slider-outer').offsetWidth; }

function _calSetSizes(){
  const w=_calW();
  if(!w)return;
  const slider=document.getElementById('cal-slider');
  slider.style.width=(w*3)+'px';
  document.querySelectorAll('.cal-slide').forEach(s=>s.style.width=w+'px');
}

function _calSnap(){
  const w=_calW();
  if(!w)return;
  document.getElementById('cal-slider').style.transform=`translateX(${-w}px)`;
}

function _initCalDrag(){
  const outer=document.getElementById('cal-slider-outer');
  const slider=document.getElementById('cal-slider');

  // ResizeObserver garantit les bonne tailles dès que la vue devient visible
  new ResizeObserver(()=>{
    _calSetSizes();
    if(!_calAnimating)_calSnap();
  }).observe(outer);

  function onStart(clientX){
    if(_calAnimating)return;
    _calDragging=true;_calDragX=clientX;_calHasMoved=false;
    slider.style.transition='none';
  }
  function onMove(clientX){
    if(!_calDragging)return;
    const dx=clientX-_calDragX;
    if(Math.abs(dx)>5)_calHasMoved=true;
    const atMin=(calYear<=MIN_CAL_YEAR&&calMonth<=MIN_CAL_MONTH);
    const clamped=atMin?Math.min(dx,0):dx;
    slider.style.transform=`translateX(${-_calW()+clamped}px)`;
  }
  function onEnd(clientX){
    if(!_calDragging)return;
    _calDragging=false;
    const dx=clientX-_calDragX;
    const atMin=(calYear<=MIN_CAL_YEAR&&calMonth<=MIN_CAL_MONTH);
    if(Math.abs(dx)<8){slider.style.transition='none';_calSnap();return;}
    _calAnimating=true;
    slider.style.transition='transform .32s cubic-bezier(.4,0,.2,1)';
    const w=_calW();
    if(dx>60&&!atMin){
      slider.style.transform='translateX(0px)';
      let m=calMonth-1,y=calYear;if(m<0){m=11;y--;}
      calMonth=m;calYear=y;
      const p=loadMonthData(false);
      setTimeout(async()=>{await p;renderCalendar();_calSetSizes();slider.style.transition='none';_calSnap();_calAnimating=false;},340);
    }else if(dx<-60){
      slider.style.transform=`translateX(${-2*w}px)`;
      calMonth++;if(calMonth>11){calMonth=0;calYear++;}
      const p=loadMonthData(false);
      setTimeout(async()=>{await p;renderCalendar();_calSetSizes();slider.style.transition='none';_calSnap();_calAnimating=false;},340);
    }else{
      _calSnap();
      setTimeout(()=>{_calAnimating=false;},340);
    }
  }
  outer.addEventListener('mousedown',e=>{onStart(e.clientX);e.preventDefault();});
  document.addEventListener('mousemove',e=>{if(_calDragging)onMove(e.clientX);});
  document.addEventListener('mouseup',e=>{if(_calDragging)onEnd(e.clientX);});
  outer.addEventListener('touchstart',e=>{onStart(e.touches[0].clientX);},{passive:true});
  document.addEventListener('touchmove',e=>{if(_calDragging)onMove(e.touches[0].clientX);},{passive:true});
  document.addEventListener('touchend',e=>{if(_calDragging)onEnd(e.changedTouches[0].clientX);});
}

async function selectCalDay(dateStr){
  // Ignorer si l'utilisateur était en train de slider (mouvement > 5px)
  if(_calHasMoved){_calHasMoved=false;return;}
  selectedCalDate=dateStr;
  renderCalendar();
  const level=levelsCache[dateStr];
  const today=getParisTodayStr();
  const isFuture=dateStr>today;
  document.getElementById('detail-panel').style.display='';

  if(!level||isFuture){
    const d=new Date(dateStr+'T00:00:00');
    document.getElementById('detail-date').textContent=`${d.getDate()} ${MONTHS_FR[d.getMonth()]} ${d.getFullYear()}`;
    document.getElementById('detail-diff').textContent=isFuture?'Niveau à venir':'Aucun niveau pour ce jour';
    document.getElementById('mini-grid-wrap').classList.remove('blurred');
    document.getElementById('mini-grid-wrap').innerHTML=`<div style="width:246px;height:246px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:8px;font-size:2.5rem">${isFuture?'🔒':'—'}</div>`;
    document.getElementById('mini-overlay').style.display='none';
    document.getElementById('detail-lb').innerHTML='<p style="font-size:12px;color:var(--muted)">Aucun score.</p>';
    document.getElementById('detail-actions').innerHTML='';
    return;
  }

  const comp=level?completionsCache[level.id]:null;
  const d=new Date(dateStr+'T00:00:00');

  // Set level for potential game start
  currentDailyLevel=level;
  currentIsReplay=!!comp; // replay uniquement si déjà complété

  // Labels
  document.getElementById('detail-date').textContent=
    level.name||`${d.getDate()} ${MONTHS_FR[d.getMonth()]} ${d.getFullYear()}`;
  document.getElementById('detail-diff').textContent=
    (level.name?`${d.getDate()} ${MONTHS_FR[d.getMonth()]} ${d.getFullYear()} · `:'')+DIFF_LABELS[level.difficulty];

  // Mini grid
  loadAndRenderMiniPuzzle(level);
  const miniWrap=document.getElementById('mini-grid-wrap');
  const miniOverlay=document.getElementById('mini-overlay');
  if(comp){miniWrap.classList.remove('blurred');miniOverlay.style.display='none';}
  else{miniWrap.classList.add('blurred');miniOverlay.style.display='flex';}

  // Prepare play view too
  document.getElementById('level-label').textContent=
    level.name||'Niveau du '+formatDate(dateStr);
  loadAndRenderPuzzle(level);
  document.getElementById('grid-wrap').classList.add('blurred');
  document.getElementById('overlay-start').style.display='flex';
  document.getElementById('play-controls').style.display='none';
  document.getElementById('result-panel').style.display='none';
  resetTimer();

  // Actions
  const actionsEl=document.getElementById('detail-actions');
  if(comp){
    actionsEl.innerHTML=`
      <span style="font-size:12px;color:var(--green)">✓ Complété en ${fmt(comp.time_seconds)}</span>
      <button class="btn" onclick="startFromCatalogue()" style="margin-left:auto">↺ Rejouer</button>
    `;
  }else{
    actionsEl.innerHTML='';
  }

  // Leaderboard
  document.getElementById('detail-lb').innerHTML='<span style="font-size:11px;color:var(--muted)">Chargement…</span>';
  document.getElementById('detail-panel').style.display='';
  const rows=await fetchLeaderboard(level.id);
  renderLeaderboard(rows,currentUserId,comp?.time_seconds,'detail-lb');
}

function loadAndRenderMiniPuzzle(level){
  const decoded=decodeSeed(level.seed);
  if(!decoded)return;
  const{sol,fix,cch,ccv}=decoded;
  const puz=Array.from({length:N},()=>Array(N).fill(EMPTY));
  for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(fix[r][c])puz[r][c]=sol[r][c];
  renderMiniGrid({puzzle:puz,ch:cch,cv:ccv},'mini-grid','');
}

/* Calendar navigation */
async function goToSelectedMonth(){
  if(!selectedCalDate)return;
  const selYear=parseInt(selectedCalDate.slice(0,4));
  const selMonth=parseInt(selectedCalDate.slice(5,7))-1;
  if(selYear===calYear&&selMonth===calMonth)return;
  if(_calAnimating)return;
  _calAnimating=true;
  const slider=document.getElementById('cal-slider');
  const dx=(selMonth<calMonth||selYear<calYear)?1:-1; // 1=prev, -1=next
  calMonth=selMonth;calYear=selYear;
  const p=loadMonthData(false);
  slider.style.transition='transform .32s cubic-bezier(.4,0,.2,1)';
  slider.style.transform=dx>0?'translateX(0px)':`translateX(${-2*_calW()}px)`;
  setTimeout(async()=>{await p;renderCalendar();_calSetSizes();slider.style.transition='none';_calSnap();_calAnimating=false;},340);
}

async function prevCalMonth(){
  let m=calMonth-1,y=calYear;
  if(m<0){m=11;y--;}
  if(y<MIN_CAL_YEAR||(y===MIN_CAL_YEAR&&m<MIN_CAL_MONTH))return;
  if(_calAnimating)return;
  _calAnimating=true;
  const slider=document.getElementById('cal-slider');
  calMonth=m;calYear=y;
  const p=loadMonthData(false);
  slider.style.transition='transform .32s cubic-bezier(.4,0,.2,1)';
  slider.style.transform='translateX(0px)';
  setTimeout(async()=>{await p;renderCalendar();_calSetSizes();slider.style.transition='none';_calSnap();_calAnimating=false;},340);
}

async function nextCalMonth(){
  if(_calAnimating)return;
  _calAnimating=true;
  const slider=document.getElementById('cal-slider');
  calMonth++;if(calMonth>11){calMonth=0;calYear++;}
  const p=loadMonthData(false);
  slider.style.transition='transform .32s cubic-bezier(.4,0,.2,1)';
  slider.style.transform=`translateX(${-2*_calW()}px)`;
  setTimeout(async()=>{await p;renderCalendar();_calSetSizes();slider.style.transition='none';_calSnap();_calAnimating=false;},340);
}

// Molette sur le calendrier → change de mois (et bloque le scroll de page).
// En dehors de la boîte calendrier, le scroll de page reste classique.
(function(){
  const wrap=document.querySelector('.cal-wrap');
  if(!wrap)return;
  let acc=0;
  wrap.addEventListener('wheel',e=>{
    e.preventDefault();                 // bloque le scroll de page tant qu'on est dans le calendrier
    if(_calAnimating){acc=0;return;}    // une seule transition à la fois
    const d=Math.abs(e.deltaX)>Math.abs(e.deltaY)?e.deltaX:e.deltaY;
    acc+=d;
    if(Math.abs(acc)<40)return;         // seuil : évite les micro-défilements (trackpad)
    const forward=acc>0; acc=0;
    forward?nextCalMonth():prevCalMonth();
  },{passive:false});
})();

// Keyboard navigation
document.addEventListener('keydown',e=>{
  if(document.getElementById('view-catalogue').style.display!=='none'){
    if(e.key==='ArrowLeft')prevCalMonth();
    if(e.key==='ArrowRight')nextCalMonth();
  }
  const tag=document.activeElement?.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA')return;
  if(document.getElementById('view-play').style.display!=='none'){
    if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();}
    if(!e.ctrlKey&&!e.altKey&&(e.key==='r'||e.key==='R')){e.preventDefault();resetPuzzle();}
  }
});


/* Utils */
function formatDate(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  return`${d.getDate()} ${MONTHS_FR[d.getMonth()]} ${d.getFullYear()}`;
}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
