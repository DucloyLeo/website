<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#0e0e0f">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion & Inscription — Tangoléo</title>
<meta name="description" content="Connectez-vous ou inscrivez-vous à Tangoléo pour accéder aux défis quotidiens, suivre vos statistiques et débloquer des badges.">
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://tangoleo.fr/login.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/common.css?v=5">
<script>(function(){const t=localStorage.getItem('tango_theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');})();</script>
<style>
  .auth-wrap {
    max-width: 380px;
    margin: 4rem auto;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }
  .auth-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 3px;
    gap: 3px;
  }
  .auth-tab {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 8px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }
  .auth-tab.active {
    background: var(--surface2);
    color: var(--text);
  }
  .auth-form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .auth-sep {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }
  .pwd-wrap {
    position: relative;
    display: block;
  }
  .pwd-wrap .form-input {
    width: 100%;
    box-sizing: border-box;
    padding-right: 2.5rem;
  }
  .pwd-eye {
    position: absolute;
    right: 0.6rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    color: var(--muted);
    display: flex;
    align-items: center;
    line-height: 1;
    z-index: 2;
  }
  .pwd-eye:hover { color: var(--text); }
  /* Masque l'icône native de Chrome/Edge sur les champs mot de passe */
  input[type="password"]::-webkit-credentials-auto-fill-button,
  input[type="password"]::-webkit-strong-password-auto-fill-button {
    visibility: hidden;
    pointer-events: none;
    position: absolute;
  }
  input[type="password"]::-ms-reveal { display: none; }
</style>
</head>
<body>

<nav class="site-nav">
  <div class="nav-left">
    <button class="hamburger" onclick="toggleMenu(event)" aria-label="Menu"><span class="hline"></span><span class="hline"></span><span class="hline"></span></button>
    <div class="nav-menu" id="nav-menu">
      <a href="/index.html" class="nav-menu-item">🎮 Jouer</a>
      <a href="/tips.html" class="nav-menu-item">💡 Conseils</a>
      <div id="menu-auth-item"></div>
    </div>
  </div>
  <a href="/index.html" class="nav-logo">☀ Tangoléo 🌙</a>
  <div class="nav-right"><div id="nav-auth"></div></div>
</nav>

<div class="auth-wrap">
  <div>
    <p class="eyebrow">Accès</p>
    <h1 style="font-size:2rem">Bienvenue</h1>
    <p style="font-size:12px;color:var(--muted);margin-top:.3rem">Connectez-vous pour sauvegarder vos scores et débloquer des badges.</p>
  </div>

  <div class="auth-tabs">
    <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Connexion</button>
    <button class="auth-tab"       id="tab-register" onclick="switchTab('register')">Inscription</button>
  </div>

  <!-- Connexion -->
  <div id="form-login">
    <form class="auth-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="login-email" placeholder="vous@exemple.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <div class="pwd-wrap">
          <input class="form-input" type="password" id="login-pwd" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="pwd-eye" onclick="togglePwd('login-pwd', this)" aria-label="Afficher/masquer le mot de passe">
            <svg id="eye-login-pwd" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="alert error" id="login-error"></div>
      <button type="submit" class="btn btn-full sun" id="login-btn">Connexion</button>
    </form>
  </div>

  <!-- Inscription -->
  <div id="form-register" style="display:none">
    <form class="auth-form" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label">Pseudo</label>
        <input class="form-input" type="text" id="reg-username" placeholder="monpseudo" required autocomplete="username" minlength="3" maxlength="20">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="reg-email" placeholder="vous@exemple.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <div class="pwd-wrap">
          <input class="form-input" type="password" id="reg-pwd" placeholder="6 caractères minimum" required autocomplete="new-password" minlength="6">
          <button type="button" class="pwd-eye" onclick="togglePwd('reg-pwd', this)" aria-label="Afficher/masquer le mot de passe">
            <svg id="eye-reg-pwd" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <p style="font-size:11px;color:var(--muted);line-height:1.6">
        En vous inscrivant, vous acceptez les <a href="legal/cgu.html" style="color:var(--moon)">CGU</a>
        et la <a href="legal/politique-confidentialite.html" style="color:var(--moon)">politique de confidentialité</a>.
      </p>
      <div class="alert error"   id="reg-error"></div>
      <div class="alert success" id="reg-success"></div>
      <button type="submit" class="btn btn-full moon" id="reg-btn">Créer un compte</button>
    </form>
  </div>

  <p class="auth-sep">
    <a href="index.html" style="color:var(--muted);text-decoration:none;font-size:11px">← Retour à l'accueil</a>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js?v=3"></script>
<script>
function switchTab(tab) {
  document.getElementById('form-login').style.display    = tab === 'login' ? '' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  err.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Connexion…';
  try {
    await signIn(
      document.getElementById('login-email').value,
      document.getElementById('login-pwd').value
    );
    const params = new URLSearchParams(window.location.search);
    window.location.href = params.get('redirect') || '/index.html';
  } catch (ex) {
    err.textContent = ex.message;
    err.classList.add('show');
    btn.disabled = false; btn.textContent = 'Connexion';
  }
}

async function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('reg-btn');
  const err = document.getElementById('reg-error');
  const ok  = document.getElementById('reg-success');
  err.classList.remove('show'); ok.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Création…';
  try {
    await signUp(
      document.getElementById('reg-email').value,
      document.getElementById('reg-pwd').value,
      document.getElementById('reg-username').value
    );
    ok.textContent = 'Compte créé ! Vérifiez votre email pour confirmer puis connectez-vous.';
    ok.classList.add('show');
    btn.textContent = 'Compte créé !';
  } catch (ex) {
    err.textContent = ex.message;
    err.classList.add('show');
    btn.disabled = false; btn.textContent = 'Créer un compte';
  }
}

function togglePwd(inputId, btn) {
  const inp = document.getElementById(inputId);
  const visible = inp.type === 'text';
  inp.type = visible ? 'password' : 'text';
  const svg = btn.querySelector('svg');
  if (visible) {
    svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  } else {
    svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  }
}

initNavAuth();
// Redirige si déjà connecté
getCurrentUser().then(u => {
  if (u) window.location.href = '/index.html';
});
</script>
</body>
</html>
