<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0e0e0f"/>

  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8fa8d4;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#f5c842;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grad)"/>

  <!-- Logo/Title -->
  <text x="600" y="200" font-family="'Crimson Pro', serif" font-size="120" font-weight="600" text-anchor="middle" fill="#ffffff">
    Tangoléo
  </text>

  <!-- Subtitle -->
  <text x="600" y="280" font-family="'DM Mono', monospace" font-size="48" text-anchor="middle" fill="#8fa8d4">
    Jeu de Puzzle Logique Gratuit
  </text>

  <!-- Description -->
  <text x="600" y="380" font-family="'DM Mono', monospace" font-size="32" text-anchor="middle" fill="#f5c842">
    ☀ Défis Quotidiens • Classements • Badges 🌙
  </text>

  <!-- Sun emoji -->
  <text x="200" y="500" font-size="80">☀</text>

  <!-- Moon emoji -->
  <text x="950" y="500" font-size="80">🌙</text>

  <!-- Footer -->
  <text x="600" y="600" font-family="'DM Mono', monospace" font-size="24" text-anchor="middle" fill="#999999">
    tangoleo.fr
  </text>
</svg>
